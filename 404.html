<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Not Found</title>
  <link rel="icon" href="static/brand/logo.png">
  <style>
    :root {
      --bg0: #07090c;
      --bg1: #0a0f16;
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255,  255, 255, 0.62);
      --border: rgba(255, 255, 255, 0.10);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 620px at 18% 12%, rgba(255, 201, 74, 0.10) 0%, transparent 58%),
        radial-gradient(900px 680px at 86% 92%, rgba(255, 183, 3, 0.08) 0%, transparent 60%),
        linear-gradient(160deg, var(--bg1), var(--bg0));
    }
    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.22);
      padding: 18px;
    }
    h1 { margin: 0 0 8px; font-size: 18px; }
    p { margin: 0 0 14px; color: var(--muted); font-size: 14px; line-height: 1.55; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="card">
      <h1>404: Page not found</h1>
      <p>This is the static GitHub Pages site. The Flask routes only work when you run the app.</p>
      <a href="./">Back to home</a>
    </div>
  </main>
</body>
</html>
