services:
  - type: web
    name: yaan
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    autoDeploy: true
    envVars:
      # Required
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false

      # Recommended production defaults
      - key: FLASK_DEBUG
        value: "0"
      - key: PUBLIC_BASE_URL
        sync: false

      # Firebase client (Auth UI)
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false

      # Firebase Admin (backend token verification)
      # Use one of these:
      - key: FIREBASE_ADMIN_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_ADMIN_CREDENTIALS_PATH
        sync: false

      # Billing (Stripe)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_YEARLY
        sync: false
      - key: STRIPE_PRICE_ULTIMATE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ULTIMATE_YEARLY
        sync: false

      # Limits / ops
      - key: FREE_DAILY_MESSAGE_LIMIT
        value: "15"
      - key: USAGE_TZ
        value: "Europe/Berlin"
      - key: ADMIN_TOKEN
        sync: false

