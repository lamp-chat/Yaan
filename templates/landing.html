<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yan</title>
  <meta name="description" content="yan is an AI chat assistant with user-to-user messaging and calls.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="/">

  <link rel="stylesheet" href="{{ url_for('static', filename='brand/nav.css', v=static_v) }}">
  <script src="{{ url_for('static', filename='brand/nav.js', v=static_v) }}" defer></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='brand/splash.css', v=static_v) }}">
  <script src="{{ url_for('static', filename='brand/splash.js', v=static_v) }}" defer></script>
  <script>document.documentElement.classList.add("fx")</script>
  <link rel="stylesheet" href="{{ url_for('static', filename='brand/motion.css', v=static_v) }}">
  <script src="{{ url_for('static', filename='brand/motion.js', v=static_v) }}" defer></script>

  <style>
    :root {
      --bg0: #07090c;
      --bg1: #0a0f16;
      --bg2: #0b121b;
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.62);
      --border: rgba(255, 255, 255, 0.10);
      --panel: rgba(18, 24, 34, 0.72);
      --panel2: rgba(18, 24, 34, 0.52);
      --blue: #ffc94a;
      --blue2: #ffb703;
      --ring1: #fd1d1d;
      --ring2: #fcb045;
      --ring3: #833ab4;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
      --r: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "Segoe UI Variable Text", "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(1200px 800px at 22% 14%, rgba(24, 119, 242, 0.18), transparent 55%),
                  radial-gradient(980px 760px at 82% 86%, rgba(131, 58, 180, 0.14), transparent 58%),
                  linear-gradient(160deg, var(--bg1), var(--bg0));
      color: var(--text);
      overflow: hidden;
    }

    .lp {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .lp-main {
      display: grid;
      grid-template-columns: 1fr 420px;
      align-items: stretch;
      gap: 0;
    }

    .lp-left {
      position: relative;
      padding: 28px 32px;
      display: grid;
      grid-template-rows: auto 1fr;
      border-right: 1px solid var(--border);
    }

    .lp-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      width: fit-content;
    }

    .lp-logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: radial-gradient(circle at 30% 20%, #ffe8a8, #ffc94a 55%, #ffb703);
      border: 1px solid rgba(255, 201, 74, 0.26);
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.35);
      object-fit: cover;
      display: block;
    }

    .lp-word {
      font-weight: 1000;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.92);
    }

    .lp-hero {
      display: grid;
      place-items: center;
      padding: 16px 10px 28px;
    }

    .lp-hero__inner {
      width: min(720px, 100%);
      display: grid;
      place-items: center;
      text-align: center;
      gap: 18px;
    }

    .lp-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 700;
      font-size: clamp(34px, 4.2vw, 56px);
      line-height: 1.12;
      letter-spacing: 0.01em;
    }

    .lp-title .a { color: var(--ring2); }
    .lp-title .b { color: var(--ring1); }
    .lp-title .c { color: var(--ring3); }

    .lp-sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      max-width: 560px;
    }

    /* "Phone stack" illustration built with CSS */
    .phones {
      position: relative;
      width: min(560px, 92%);
      height: 340px;
      margin-top: 4px;
    }

    .phone {
      position: absolute;
      width: 220px;
      height: 300px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(0, 0, 0, 0.22));
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 34px 90px rgba(0, 0, 0, 0.55);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(140px 140px at 30% 28%, rgba(255, 201, 74, 0.36), transparent 60%),
        radial-gradient(170px 160px at 76% 72%, rgba(253, 29, 29, 0.22), transparent 62%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.20));
      opacity: 0.95;
    }

    .phone::after {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 18px;
      height: 38px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.26);
      background: rgba(0, 0, 0, 0.18);
    }

    .phone .topline {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 16px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
    }

    .phone.a { transform: rotate(-8deg); left: 10%; top: 28px; }
    .phone.b { transform: rotate(0deg); left: 33%; top: 10px; }
    .phone.c { transform: rotate(10deg); left: 56%; top: 36px; }

    .bubble {
      position: absolute;
      top: 56px;
      left: 22px;
      border-radius: 999px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.92);
      color: #14110a;
      font-weight: 900;
      font-size: 12px;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    .react {
      position: absolute;
      left: 10%;
      bottom: 26px;
      width: 64px;
      height: 64px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #ff6a00, #ff006a 55%, #8a2be2);
      filter: blur(0);
      opacity: 0.92;
      transform: translateX(-20px);
    }

    .ring {
      position: absolute;
      right: 18%;
      top: 168px;
      width: 66px;
      height: 66px;
      border-radius: 999px;
      background: conic-gradient(from 180deg, var(--ring1), var(--ring2), var(--ring3), var(--ring1));
      padding: 3px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
    }

    .ring .inner {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    /* Right login panel */
    .lp-right {
      padding: 28px 28px;
      background:
        radial-gradient(1000px 700px at 30% 0%, rgba(24, 119, 242, 0.12), transparent 55%),
        linear-gradient(180deg, rgba(10, 15, 22, 0.95), rgba(9, 14, 20, 0.92));
    }

    .login {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .login h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.86);
    }

    .field {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.18);
      padding: 12px 12px;
      color: rgba(255, 255, 255, 0.92);
      outline: none;
      font-size: 14px;
    }

    .field::placeholder { color: rgba(255, 255, 255, 0.46); }

    .field:focus {
      border-color: rgba(24, 119, 242, 0.75);
      box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.18);
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 12px 12px;
      font-weight: 1000;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn.primary {
      background: linear-gradient(180deg, var(--blue2), var(--blue));
      color: #fff;
    }

    .btn.ghost {
      background: transparent;
      color: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .btn.ghost:hover { border-color: rgba(255, 255, 255, 0.34); }

    .meta {
      padding-top: 4px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .meta a { color: rgba(255, 183, 3, 0.95); text-decoration: none; }
    .meta a:hover { text-decoration: underline; }

    .lp-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 14px 18px;
      color: rgba(255, 255, 255, 0.42);
      font-size: 11px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .lp-footer a { color: inherit; text-decoration: none; }
    .lp-footer a:hover { color: rgba(255, 255, 255, 0.70); }

    @media (max-width: 980px) {
      html, body { overflow: auto; }
      .lp-main { grid-template-columns: 1fr; }
      .lp-left { border-right: 0; border-bottom: 1px solid var(--border); }
      .lp { grid-template-rows: auto auto; }
    }
  </style>
</head>
<body>
  <div id="yanSplash" class="yan-splash" aria-hidden="true">
    <div class="yan-splash__inner">
      <img class="yan-splash__logo" src="{{ url_for('static', filename='brand/logo.png') }}" alt="yan">
      <div class="yan-splash__word">yan</div>
      <div class="yan-splash__rule"></div>
    </div>
    <button class="yan-splash__skip" type="button" data-splash-skip>Skip</button>
  </div>

  <div class="lp">
    <div class="lp-main">
      <section class="lp-left" data-reveal>
        <a class="lp-brand" href="/" data-nav>
          <img class="lp-logo" src="{{ url_for('static', filename='brand/logo.png') }}" alt="yan">
          <span class="lp-word">yan</span>
        </a>

        <div class="lp-hero">
          <div class="lp-hero__inner">
            <h1 class="lp-title">
              Make room for your <span class="a">ideas</span>, your <span class="b">people</span>, your <span class="c">plans</span>.
            </h1>
            <p class="lp-sub">
              A calm place to think with AI, then message or call in one click. Fast, clean, and built for the web.
            </p>

            <div class="phones" aria-hidden="true">
              <div class="phone a"><div class="topline"></div></div>
              <div class="phone b"><div class="topline"></div><div class="bubble">AI <span style="opacity:.75">+</span> DM</div></div>
              <div class="phone c"><div class="topline"></div></div>
              <div class="react"></div>
              <div class="ring"><div class="inner"></div></div>
            </div>
          </div>
        </div>
      </section>

      <aside class="lp-right" data-reveal>
        <div class="login">
          <h2>Sign in to yan</h2>
          <input class="field" placeholder="Username / Email" disabled>
          <input class="field" placeholder="Password" type="password" disabled>
          <a class="btn primary" href="/auth" data-nav>Open Sign In</a>
          <div style="height: 6px;"></div>
          <a class="btn ghost" href="/ai" data-nav>Open AI Chat</a>
          <div class="meta">
            New here? <a href="/auth" data-nav>Create an account</a>
          </div>
        </div>
      </aside>
    </div>

    <footer class="lp-footer">
      <a href="/feedback" data-nav>Feedback</a>
      <a href="/sitemap.xml" data-nav>Sitemap</a>
      <a href="/robots.txt" data-nav>Robots</a>
      <span>2026 yan</span>
    </footer>
  </div>
</body>
</html>
