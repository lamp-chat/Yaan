<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>yan</title>
  <meta http-equiv="refresh" content="0; url=/ai">
  <style>
    :root { color-scheme: light; }
    html, body { height: 100%; margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "SF Pro Text", "Segoe UI", sans-serif; }
    body { display: grid; place-items: center; background: #fbfaf7; color: rgba(17,24,39,0.92); }
    .card {
      width: min(520px, calc(100vw - 48px));
      border-radius: 20px;
      border: 1px solid rgba(17,24,39,0.10);
      background: rgba(255,255,255,0.86);
      box-shadow: 0 24px 72px rgba(0,0,0,0.10);
      padding: 18px 18px;
      text-align: center;
    }
    .title { font-weight: 900; letter-spacing: 0.02em; }
    .fine { margin-top: 8px; color: rgba(17,24,39,0.62); font-size: 13px; line-height: 1.4; }
    a { color: rgba(161,98,7,0.95); text-decoration: none; font-weight: 800; }
    a:hover { text-decoration: underline; text-underline-offset: 0.18em; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Redirecting to yan AI…</div>
    <div class="fine">If you are not redirected automatically, open <a href="/ai">/ai</a>.</div>
  </div>
</body>
</html>
